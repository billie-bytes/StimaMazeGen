<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming Map Generator (Bare Wasm)</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: #121212; color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .controls {
            display: flex; gap: 15px; margin-bottom: 20px; padding: 15px;
            background: #1e1e1e; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .controls label { display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .controls input {
            width: 60px; padding: 6px; text-align: center; background: #2a2a2a;
            border: 1px solid #444; color: white; border-radius: 4px;
        }
        .controls button {
            padding: 8px 16px; background-color: #03dac6; color: #000; border: none;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s;
        }
        .controls button:hover { background-color: #00b3a6; }
        
        #maze-container {
            width: 80vmin; height: 80vmin; background-color: #1e1e1e;
            border: 2px solid #333; display: grid;
        }
        .cell { border: 1px solid rgba(255, 255, 255, 0.05); box-sizing: border-box; }
        .cell.path { background-color: #bb86fc; }
        .cell.empty { background-color: transparent; }
    </style>
</head>
<body>

    <div class="controls">
        <label>Width (N): <input type="number" id="input-n" value="20" min="5" max="100"></label>
        <label>Height (M): <input type="number" id="input-m" value="20" min="5" max="100"></label>
        <button id="generate-btn">Generate Layout</button>
    </div>

    <div id="maze-container"></div>

    <script>
        let wasmExports = null;

        // Fetch and initialize the bare Wasm module
        WebAssembly.instantiateStreaming(fetch("map_generator.wasm"))
            .then(obj => {
                wasmExports = obj.instance.exports;
                console.log("Bare WebAssembly Module Loaded Successfully.");
                document.getElementById('generate-btn').click();
            })
            .catch(err => console.error("Wasm loading failed:", err));

        document.getElementById('generate-btn').addEventListener('click', () => {
            if (!wasmExports) return;

            const n = parseInt(document.getElementById('input-n').value);
            const m = parseInt(document.getElementById('input-m').value);
            const seed = Math.floor(Math.random() * 1000000);

            wasmExports.resetMemory();

            const topoPtr = wasmExports.generateTopologicalGrid(n, m, seed);
            const pathPtr = wasmExports.carveOptimalPath(topoPtr, n, m);

            const totalCells = n * m;
            const HEAP32 = new Int32Array(wasmExports.memory.buffer);
            const pathData = HEAP32.subarray(pathPtr / 4, (pathPtr / 4) + totalCells);

            renderMaze(pathData, n, m);
        });

        function renderMaze(pathData, n, m) {
            const container = document.getElementById('maze-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${m}, 1fr)`;

            for (let i = 0; i < pathData.length; i++) {
                const cell = document.createElement('div');
                cell.className = pathData[i] === 1 ? 'cell path' : 'cell empty';
                container.appendChild(cell);
            }
        }
    </script>
</body>
</html>
